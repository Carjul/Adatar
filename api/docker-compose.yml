version: "3.9" 
services: 
  api:
    container_name: api_adatar
    restart: always
    build: .
    ports:
      - 3004:3001  
    links:
      - postgres
    volumes:
      - .:/usr/src/app

  postgres: 
    image: postgres
    restart: always 
    ports: 
      - 5432:5432
    environment: 
      POSTGRES_USER: postgres 
      POSTGRES_PASSWORD: postgres 
      POSTGRES_DB: adatar  
  pgadmin: 
    image: dpage/pgadmin4
    restart: always
    environment: 
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports: 
      - 80:80
    depends_on:
      - postgres 
    logging: 
      driver: none
       

