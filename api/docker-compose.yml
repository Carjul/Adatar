version: "3.9" 
services: 
  postgres: 
    image: postgres
    restart: always 
    ports: 
      - 5432:5432
    environment: 
      DATABASE_HOST: 127.0.0.1
      POSTGRES_USER: postgres 
      POSTGRES_PASSWORD: postgres 
      POSTGRES_DB: adatar  
  pgadmin: 
    image: dpage/pgadmin4
    restart: always 
    ports: 
      - 5050:80
    environment: 
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
       

 